name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test imports
        run: |
          python -c "import optimizer_msba_v1_engine; print('optimizer_msba_v1_engine OK')"
          python -m py_compile portfolio_returns_engine.py && echo "portfolio_returns_engine.py syntax OK"
          python -m py_compile ui_style.py && echo "ui_style.py syntax OK"

      - name: Run unit tests
        run: pytest -q

      - name: Lint with flake8
        run: flake8 .
